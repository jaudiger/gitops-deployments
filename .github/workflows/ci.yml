name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            terraform:
              - '**/*.tf'
              - '**/*.tfvars'
              - '**/*.hcl'
              - '.github/workflows/ci.yml'
            workflows:
              - '.github/workflows/**'

  lint-terraform:
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/static-analysis-terraform.yml@4aef3115afe05a19785b3e14970ecd4f400cc457

  audit-terraform:
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/audit-terraform.yml@4aef3115afe05a19785b3e14970ecd4f400cc457

  terraform-plan:
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Brioche
        uses: brioche-dev/setup-brioche@9b82d4ee697500f7d81f6397a943935ffa3d887b # v1.5.0

      - name: Install Terraform
        run: brioche install -r terraform

      - name: Cache terraform registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .terraform
          key: terraform-plan-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-plan-

      - name: Generate the plan of Terraform
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          GITHUB_APP_ID: ${{ secrets.GH_APP_ID }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
          GITHUB_APP_PEM_FILE: ${{ secrets.GH_APP_PEM_FILE }}
          TF_VAR_crates_io_api_token: ${{ secrets.TF_VAR_CRATES_IO_API_TOKEN }}
          BACKEND_ACCESS_KEY: ${{ secrets.BACKEND_ACCESS_KEY }}
          BACKEND_SECRET_KEY: ${{ secrets.BACKEND_SECRET_KEY }}
        run: |
          terraform init -backend-config=access_key="$BACKEND_ACCESS_KEY" -backend-config=secret_key="$BACKEND_SECRET_KEY"
          terraform plan

  lint-actions:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/static-analysis-github-actions.yml@4aef3115afe05a19785b3e14970ecd4f400cc457

  ci:
    if: always()
    needs: [lint-terraform, audit-terraform, terraform-plan, lint-actions]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required checks passed
        env:
          RESULTS: ${{ toJson(needs.*.result) }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE '"(failure|cancelled)"'; then
            echo "One or more required checks failed"
            exit 1
          fi
