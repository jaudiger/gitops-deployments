name: Continuous Integration - Audit (Terraform)

on:
  push:
    paths:
      - ".github/workflows/audit-terraform.yml"
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.hcl"
  pull_request:
    paths:
      - ".github/workflows/audit-terraform.yml"
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.hcl"
  workflow_dispatch:

concurrency:
  group: audit-terraform-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  terraform-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Brioche
        uses: brioche-dev/setup-brioche@v1.5.0

      - name: Install Terraform tools
        run: brioche install -r trivy

      - name: Run security scanner
        run: trivy conf --severity HIGH,CRITICAL .
